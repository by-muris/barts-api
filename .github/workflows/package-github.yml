name: Publish Package

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: package-github-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish to GitHub Packages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          registry-url: https://npm.pkg.github.com
          scope: '@${{ github.repository_owner }}'

      - name: Install dependencies
        run: npm ci

      - name: Build package artifacts
        run: npm run build

      - name: Prepare GitHub Packages metadata
        run: |
          OWNER_SCOPE="$(printf '%s' "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          BASE_NAME="$(node -p "const name = require('./package.json').name; (name.includes('/') ? name.split('/').pop() : name).toLowerCase()")"

          npm pkg set "name=@${OWNER_SCOPE}/${BASE_NAME}"
          npm pkg set "publishConfig.registry=https://npm.pkg.github.com"
          npm pkg set "repository.type=git"
          npm pkg set "repository.url=git+https://github.com/${GITHUB_REPOSITORY}.git"

      - name: Verify package contents
        run: npm pack --dry-run --ignore-scripts

      - name: Publish package
        run: npm publish --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
